name: proreport
description: "Aplicación de Reporte de Incidentes - Seguridad y Salud Ocupacional"
publish_to: 'none'
version: 0.5.0

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.10.0

  # Image Picker
  image_picker: ^1.1.2
  file_picker: ^8.0.0

  # State Management
  provider: ^6.1.2

  # UI Components
  dropdown_search: ^6.0.1

  # Localization
  flutter_localizations:
    sdk: flutter

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  mime: ^2.0.0
  http: ^1.6.0

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Excel export
  excel: ^4.0.6
  path_provider: ^2.1.4
  open_file: ^3.5.4
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - Logo.png
    - .env
